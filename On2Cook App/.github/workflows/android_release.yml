name: Android Release

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Android signing keystore
        shell: bash
        env:
          ON2COOK_ANDROID_KEYSTORE_BASE64: ${{ secrets.ON2COOK_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ON2COOK_ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p ProjectData
            echo "$ON2COOK_ANDROID_KEYSTORE_BASE64" | base64 --decode > ProjectData/ontocook_keystore.jks
          else
            echo "No Android keystore secret configured; release build will be unsigned unless Gradle config supplies signing."
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Android app
        env:
          ON2COOK_ANDROID_STORE_PASSWORD: ${{ secrets.ON2COOK_ANDROID_STORE_PASSWORD }}
          ON2COOK_ANDROID_KEY_ALIAS: ${{ secrets.ON2COOK_ANDROID_KEY_ALIAS }}
          ON2COOK_ANDROID_KEY_PASSWORD: ${{ secrets.ON2COOK_ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            android-app/**/*.apk
            android-app/**/*.aab
          if-no-files-found: warn

  publish-release:
    name: Publish GitHub release
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/android-v')

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: dist/android

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/**
